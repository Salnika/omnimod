name: Feature request
description: Suggest a codemod, plugin, or core capability.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What migration or workflow should omnimod support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the expected input, output, diagnostics, and edge cases.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Examples
      description: Add links or code snippets if useful.
