name: Bug report
description: Report a reproducible omnimod problem.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the input code, command, output, and expected result.
      placeholder: |
        omnimod run styled-to-vanilla-extract "src/**/*.tsx"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "@omnimod/cli 0.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Node.js, package manager, OS
